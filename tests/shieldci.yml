# ShieldCI Configuration
# Place this file in your repo root to configure security scanning.

project:
  name: "shieldci-target"
  framework: "Node.js"
  language: "javascript"

build:
  command: "npm install"
  run: "node app.js"
  port: 3000

endpoints:
  - path: "/"
    method: "GET"
    description: "Health check"

  - path: "/login"
    method: "GET"
    params:
      - name: "username"
        type: "string"
        description: "User login name"
    description: "User login endpoint - queries database"

database:
  type: "sqlite"
  orm: false  # raw queries used

auth:
  enabled: false
  # token: "Bearer eyJ..."       # JWT/Bearer token for authenticated scanning
  # cookie: "session=abc123"     # Session cookie
  # api_key: "sk-..."           # API key
  # header_name: "Authorization" # Custom auth header name

# Static analysis (SAST) — scans source code for vulnerabilities
sast:
  enabled: true
  config: "auto"  # Options: "auto", "p/owasp-top-ten", "p/security-audit"

# Dependency scanning (SCA) — finds vulnerable packages
sca:
  enabled: true

# Scope enforcement (required for cloud-tier scanning)
scope:
  allowed_targets:
    - "localhost"
    - "127.0.0.1"
    # - "*.yourdomain.com"      # Wildcard domain
  authorization_proof: "none"    # Options: "none" (local only), "dns", "file"

files:
  - "app.js"
