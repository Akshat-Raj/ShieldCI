apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: dispatcher
    app.kubernetes.io/part-of: shieldci
spec:
  replicas: {{ .Values.dispatcher.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dispatcher
    spec:
      serviceAccountName: shieldci-dispatcher
      containers:
        - name: dispatcher
          image: {{ .Values.dispatcher.image }}
          ports:
            - containerPort: {{ .Values.dispatcher.port }}
          env:
            - name: REDIS_URL
              value: "redis://redis.{{ .Values.namespace }}.svc.cluster.local:6379"
            - name: REGISTRY_HOST
              value: {{ .Values.registry.host }}
            - name: ENGINE_IMAGE
              value: {{ .Values.engine.image }}
            - name: RESULTS_COLLECTOR_URL
              value: "http://results-collector.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.resultsCollector.httpPort }}"
            - name: MAX_CONCURRENT_SCANS
              value: {{ .Values.dispatcher.maxConcurrentScans | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel }}
          resources:
            {{- toYaml .Values.dispatcher.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.dispatcher.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dispatcher
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app.kubernetes.io/name: dispatcher
  ports:
    - port: {{ .Values.dispatcher.port }}
      targetPort: {{ .Values.dispatcher.port }}
