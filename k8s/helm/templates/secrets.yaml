apiVersion: v1
kind: Secret
metadata:
  name: shieldci-db-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  username: shieldci
  password: {{ .Values.secrets.dbPassword | quote }}
  connection-string: "postgresql://shieldci:{{ .Values.secrets.dbPassword }}@postgresql.{{ .Values.namespace }}.svc.cluster.local:5432/{{ .Values.postgresql.database }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: shieldci-encryption-key
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  key: {{ .Values.secrets.encryptionKey | quote }}
