# ── Internal Container Registry (Harbor-compatible) ──
# Stores target app images built by Kaniko. Scan namespaces pull from here.
# In production, replace with Harbor for vulnerability scanning + RBAC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: shieldci-control-plane
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/part-of: shieldci
    shieldci.io/component: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
        shieldci.io/component: registry
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
              name: registry
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
            # Garbage collect untagged images (cleanup after scans)
            - name: REGISTRY_STORAGE_MAINTENANCE_UPLOADPURGING_ENABLED
              value: "true"
            - name: REGISTRY_STORAGE_MAINTENANCE_UPLOADPURGING_AGE
              value: "1h"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
      volumes:
        - name: registry-data
          emptyDir:
            sizeLimit: "50Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: shieldci-control-plane
  labels:
    app.kubernetes.io/name: registry
    shieldci.io/component: registry
spec:
  selector:
    app.kubernetes.io/name: registry
  ports:
    - port: 5000
      targetPort: registry
      protocol: TCP
      name: registry
  type: ClusterIP
---
# ── Registry Network Policy ──
# Only Kaniko build pods and engine/target pods can access the registry.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-registry
  namespace: shieldci-control-plane
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: registry
  policyTypes:
    - Ingress
  ingress:
    # Kaniko pushes images
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/managed-by: shieldci
          podSelector:
            matchLabels:
              shieldci.io/component: builder
      ports:
        - port: 5000
    # Scan namespaces pull images
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/managed-by: shieldci
      ports:
        - port: 5000
