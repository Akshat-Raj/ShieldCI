# ── ShieldCI Results Collector Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: results-collector
  namespace: shieldci-control-plane
  labels:
    app.kubernetes.io/name: results-collector
    app.kubernetes.io/part-of: shieldci
    shieldci.io/component: results-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: results-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: results-collector
        shieldci.io/component: results-collector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: results-collector
          image: shieldci/results-collector:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: mtls
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shieldci-db-credentials
                  key: connection-string
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: shieldci-encryption-key
                  key: key
            - name: TLS_CERT
              value: /etc/shieldci/tls/server.crt
            - name: TLS_KEY
              value: /etc/shieldci/tls/server.key
            - name: TLS_CA
              value: /etc/shieldci/tls/ca.crt
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/shieldci/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tls-certs
          secret:
            secretName: results-collector-tls
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: results-collector
  namespace: shieldci-control-plane
spec:
  selector:
    app.kubernetes.io/name: results-collector
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 8443
      targetPort: 8443
      name: mtls
