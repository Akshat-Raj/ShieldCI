# ── ShieldCI TTL Controller Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttl-controller
  namespace: shieldci-control-plane
  labels:
    app.kubernetes.io/name: ttl-controller
    app.kubernetes.io/part-of: shieldci
    shieldci.io/component: ttl-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ttl-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ttl-controller
        shieldci.io/component: ttl-controller
    spec:
      serviceAccountName: shieldci-ttl-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ttl-controller
          image: shieldci/ttl-controller:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
