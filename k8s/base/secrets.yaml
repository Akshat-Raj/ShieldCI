# ── Secrets (create these before deploying, or use sealed-secrets / external-secrets) ──

# Database credentials
apiVersion: v1
kind: Secret
metadata:
  name: shieldci-db-credentials
  namespace: shieldci-control-plane
type: Opaque
stringData:
  username: shieldci
  # CHANGE THIS — placeholder only
  password: "CHANGE_ME_BEFORE_DEPLOY"
  connection-string: "postgresql://shieldci:CHANGE_ME_BEFORE_DEPLOY@postgresql.shieldci-control-plane.svc.cluster.local:5432/shieldci"
---
# AES-256-GCM encryption key for results-at-rest
# Generate with: openssl rand -hex 32
apiVersion: v1
kind: Secret
metadata:
  name: shieldci-encryption-key
  namespace: shieldci-control-plane
type: Opaque
stringData:
  key: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_HEX_32"
---
# Redis credentials
# Generate password with: openssl rand -base64 32
apiVersion: v1
kind: Secret
metadata:
  name: shieldci-redis-credentials
  namespace: shieldci-control-plane
type: Opaque
stringData:
  password: "CHANGE_ME_BEFORE_DEPLOY"
  url: "redis://:CHANGE_ME_BEFORE_DEPLOY@redis.shieldci-control-plane.svc.cluster.local:6379"
---
# Internal registry credentials (used by Kaniko to push images)
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: shieldci-control-plane
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "registry.shieldci-control-plane.svc.cluster.local:5000": {
          "username": "shieldci",
          "password": "CHANGE_ME_BEFORE_DEPLOY"
        }
      }
    }
