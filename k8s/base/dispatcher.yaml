# ── ShieldCI Dispatcher Deployment ──
# Receives scan requests via API, creates ephemeral K8s scan namespaces.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher
  namespace: shieldci-control-plane
  labels:
    app.kubernetes.io/name: dispatcher
    app.kubernetes.io/part-of: shieldci
    shieldci.io/component: dispatcher
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dispatcher
        shieldci.io/component: dispatcher
    spec:
      serviceAccountName: shieldci-dispatcher
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dispatcher
          image: shieldci/dispatcher:latest
          ports:
            - containerPort: 3002
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "3002"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: shieldci-redis-credentials
                  key: url
            - name: REGISTRY_HOST
              value: registry.shieldci-control-plane.svc.cluster.local:5000
            - name: ENGINE_IMAGE
              value: shieldci/kali-engine:latest
            - name: RESULTS_COLLECTOR_URL
              value: http://results-collector.shieldci-control-plane.svc.cluster.local:8080
            - name: MAX_CONCURRENT_SCANS
              value: "5"
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dispatcher
  namespace: shieldci-control-plane
spec:
  selector:
    app.kubernetes.io/name: dispatcher
  ports:
    - port: 3002
      targetPort: 3002
